# InspIRCd Configuration for AntiRC
# Place this in your InspIRCd config directory

<config format="xml">

<server name="irc.antirc.local"
        description="AntiRC Private IRC Server"
        network="AntiRC">

<admin name="AntiRC Admin"
       email="admin@antirc.local">

<bind address="" port="6667" type="clients">
<bind address="" port="6697" type="clients" sslprofile="gnutls">

<module name="m_ssl_gnutls">
<sslprofile name="gnutls"
            provider="gnutls"
            certfile="/inspircd/conf/cert.pem"
            keyfile="/inspircd/conf/key.pem"
            dhfile="/inspircd/conf/dhparams.pem">

<module name="m_sha256">
<module name="m_password_hash">

<connect name="main"
         allow="*"
         maxchans="20"
         timeout="60"
         flood="100"
         threshold="5"
         commandrate="1000"
         fakelag="on"
         localmax="100"
         globalmax="100"
         useident="no"
         limit="5000"
         modes=""
         requiressl="no"
         port="6667">

<connect name="webirc"
         allow="*"
         port="6667"
         useident="no"
         limit="1000">

<class name="opers"
       commands="*"
       usermodes="*"
       chanmodes="*"
       privs="*"
       snomasks="*">

<type name="NetAdmin"
      classes="opers"
      vhost="ircop.antirc.local">

<oper name="admin"
      password="$sha256$changeme"
      hash="sha256"
      host="*@*"
      type="NetAdmin">

<module name="m_customprefix">
<module name="m_banredirect">
<module name="m_blockcolor">
<module name="m_botmode">
<module name="m_callerid">
<module name="m_cban">
<module name="m_chanfilter">
<module name="m_chanlog">

<module name="m_commonchans">
<module name="m_dccallow">
<module name="m_deaf">
<module name="m_delayjoin">
<module name="m_delaymsg">
<module name="m_denychans">
<module name="m_filter">
<module name="m_gecosban">
<module name="m_securelist">
<module name="m_hidechans">
<module name="m_hidelist">
<module name="m_ident">
<module name="m_kicknorejoin">
<module name="m_knock">
<module name="m_mlock">
<module name="m_namedmodes">
<module name="m_nickflood">
<module name="m_nicklock">
<module name="m_noctcp">
<module name="m_nokicks">
<module name="m_nonicks">
<module name="m_nonotice">
<module name="m_operjoin">
<module name="m_operlevels">
<module name="m_operlog">
<module name="m_opermodes">
<module name="m_opermotd">
<module name="m_override">
<module name="m_passforward">
<module name="m_redirect">
<module name="m_regex_glob">
<module name="m_repeat">
<module name="m_sakick">
<module name="m_samode">
<module name="m_sanick">
<module name="m_sapart">
<module name="m_saquit">
<module name="m_serverban">
<module name="m_services_account">
<module name="m_showfile">
<module name="m_silence">
<module name="m_sslmodes">
<module name="m_stripcolor">
<module name="m_svshold">
<module name="m_swhois">
<module name="m_uninvite">
<module name="m_vhost">
<module name="m_watch">

<module name="m_spanningtree">

<link name="services.antirc.local"
      ipaddr="127.0.0.1"
      port="7000"
      allow="127.0.0.1"
      timeout="300"
      ssl="no"
      bind="127.0.0.1"
      stat="yes"
      hidden="no"
      sendpass="services"
      recvpass="services">

<uline server="services.antirc.local" silent="yes">

<module name="m_services">

<log method="file"
     type="*"
     level="default"
     target="/inspircd/data/inspircd.log">

<module name="m_alias">

<alias text="NICKSERV"
       replace="PRIVMSG NickServ :$2-"
       requires="services.antirc.local"
       uline="yes">

<alias text="CHANSERV"
       replace="PRIVMSG ChanServ :$2-"
       requires="services.antirc.local"
       uline="yes">

<alias text="OPERSERV"
       replace="PRIVMSG OperServ :$2-"
       requires="services.antirc.local"
       uline="yes"
       operonly="yes">

<module name="m_cgiirc">
<cgihost type="webirc"
         password="webirc_password"
         mask="*">

# Channel defaults
<options prefixquit="Quit: "
         suffixquit=""
         prefixpart="&quot;"
         suffixpart="&quot;"
         syntaxhints="yes"
         cyclehosts="yes"
         cyclehostsfromuser="no"
         ircv3nicknames="no"
         announcets="yes"
         allowmismatch="no"
         defaultbind="auto"
         hostintopic="yes"
         defaultmodes="nt"
         moronbanner="*** You're not welcome here"
         invitebypassmodes="yes"
         nosnoticestack="no"
         welcomenotice="yes"
         maxtargets="20"
         customversion=""
         hidesplits="no"
         hidebans="no"
         flatlinks="no"
         hideulines="no"
         hidewhois=""
         hideoper="no"
         hidemodes=""
         maxwho="128"
         allowhalfop="yes"
         maxchanlen="64"
         maxmodelen="64"
         maxident="11"
         maxquit="255"
         maxtopic="307"
         maxkick="255"
         maxgecos="128"
         maxaway="200">

<limits nicklen="31"
        chanlen="64"
        modelen="64"
        identlen="11"
        hostlen="64"
        gecoslen="128"
        awayslen="200"
        passlen="32"
        topiclen="307"
        kicklen="255"
        quitlen="255">

<performance netbuffersize="10240"
             somaxconn="128"
             limitsomaxconn="no"
             quietbursts="yes"
             nosendq="no">

<security announceinvites="dynamic"
          hidemask=""
          hidechans=""
          hideserver=""
          hideulines="no"
          flatlinks="no"
          hidewhois=""
          hidebans="no"
          hideoper="no"
          hidemodes=""
          maxtargets="20"
          customversion=""
          operspywhois="no"
          restrictbannedusers="yes"
          genericoper="no"
          userstats="PbflkMmo"
          ciphers="DEFAULT:!MD5"
          channelexceptions=""
          inviteexceptions=""
          cyclehosts="yes"
          cyclehostsfromuser="no">

<channels users="20"
          opers="60">
