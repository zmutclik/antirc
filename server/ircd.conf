# InspIRCd Configuration for AntiRC (Minimal)
# Place this in your InspIRCd config directory

<config format="xml">

<server name="antirc.zmutclik.my.id"
        description="AntiRC Private IRC Server"
        network="AntiRC">

<admin name="AntiRC Admin"
       email="fahrudin.hariadi@gmail.com">

<bind address="" port="6667" type="clients">
<bind address="" port="6697" type="clients" sslprofile="gnutls">

<module name="m_ssl_gnutls">
<sslprofile name="gnutls"
            provider="gnutls"
            certfile="/inspircd/conf/cert.pem"
            keyfile="/inspircd/conf/key.pem"
            dhfile="/inspircd/conf/dhparams.pem">

<module name="m_sha256">
<module name="m_password_hash">

<connect name="main"
         allow="*"
         maxchans="20"
         timeout="60"
         limit="100"
         useident="no"
         port="6667">

<class name="opers"
       commands="*"
       usermodes="*"
       chanmodes="*"
       privs="*"
       snomasks="*">

<type name="NetAdmin"
      classes="opers"
      vhost="ircop.zmutclik.my.id">

<oper name="zmutclik"
      password="echo -n 'password' | sha256sum"
      hash="sha256"
      host="*@172.*.*.*"
      type="NetAdmin">

<log method="file"
     type="*"
     level="default"
     target="/inspircd/data/inspircd.log">
